<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדר הדיונים</title>
  <link rel="stylesheet" href="/compiled-style.css" />
</head>
<body>

  <!-- ================================================================= -->
  <!-- LANDING PAGE                                                      -->
  <!-- ================================================================= -->
  <div id="landing-page" class="landing-page">
    <h1 class="landing-title">חדר הדיונים</h1>

    <!-- New Meeting Form -->
    <section class="landing-section mb-8">
      <h2 class="landing-section-title">פגישה חדשה</h2>

      <form id="new-meeting-form" class="new-meeting-form">
        <div>
          <label for="meeting-title" class="form-label">כותרת</label>
          <input
            type="text"
            id="meeting-title"
            name="title"
            required
            class="form-input"
            placeholder="למשל: גן עדן — בראשית ב:ד-ב:יז"
          />
        </div>

        <div>
          <label class="form-label mb-2">משתתפים</label>
          <div id="participant-cards" class="participant-cards">
            <!-- Populated dynamically from /api/agents -->
          </div>
          <p id="no-participants-error" class="form-error">יש לבחור לפחות משתתף אחד</p>
        </div>

        <div class="form-submit-wrapper">
          <button type="submit" class="btn-primary">
            התחל דיון
          </button>
        </div>
      </form>
    </section>

    <!-- Previous Meetings -->
    <section class="landing-section">
      <h2 class="landing-section-title">פגישות</h2>
      <div id="meeting-list">
        <p class="loading-text">טוען...</p>
      </div>
    </section>
  </div>

  <!-- ================================================================= -->
  <!-- DELIBERATION UI                                                   -->
  <!-- ================================================================= -->
  <div id="deliberation-page" class="deliberation-room hidden">

    <!-- Conversation Feed -->
    <div class="conversation-feed">
      <!-- View-only banner -->
      <div id="view-only-banner" class="view-only-banner">
        מצב צפייה בלבד
      </div>
      <div id="conversation-messages" class="conversation-messages">
        <!-- Messages rendered here -->
      </div>
    </div>

    <!-- StatusRead Bar -->
    <div class="status-read-bar">
      <div class="status-read-controls">
        <button id="pause-btn" class="btn-status-read-control" title="השהה/המשך">
          &#x25B6; המשך
        </button>
        <button id="attention-btn" class="btn-attention" title="בקשת רשות דיבור">
          &#x270B; תשומת לב
        </button>
      </div>
      <div class="status-read-content">
        <span id="status-read-text" class="status-read-text"></span>
      </div>
      <div class="status-read-indicators">
        <span id="status-read-phase" class="status-read-phase-badge"></span>
        <span id="status-read-cost" class="status-read-cost" title="עלות משוערת"></span>
      </div>
    </div>

    <!-- Human Input -->
    <div class="human-input">
      <div class="human-input-row">
        <label for="human-input-textarea"></label>
        <textarea
          id="human-input-textarea"
          dir="auto"
          class="human-textarea"
          placeholder="הקלד הודעה או /end לסיום"
          disabled
        ></textarea>
        <button id="human-submit-btn" class="btn-send" disabled>
          &#x21B5;
        </button>
      </div>
    </div>

  </div>

  <!-- ================================================================= -->
  <!-- ROLLBACK CONFIRMATION DIALOG                                      -->
  <!-- ================================================================= -->
  <div id="rollback-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 class="modal-title">חזרה לנקודה קודמת</h3>
      <div id="rollback-preview" class="rollback-preview">
        <!-- Preview of target message -->
      </div>
      <p id="rollback-warning" class="rollback-warning"></p>
      <p class="rollback-hint">לאחר החזרה תוכל לערוך את ההודעה ולהמשיך משם.</p>
      <div class="modal-actions">
        <button id="rollback-cancel" class="btn-secondary">ביטול</button>
        <button id="rollback-confirm" class="btn-confirm">אישור חזרה</button>
      </div>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- RECONNECTION INDICATOR                                            -->
  <!-- ================================================================= -->
  <div id="reconnecting-indicator" class="reconnecting-indicator">
    מתחבר מחדש...
  </div>

  <!-- Back to landing button (visible during deliberation) -->
  <button id="back-to-landing" class="btn-back hidden">
    &#x2190; חזרה
  </button>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
