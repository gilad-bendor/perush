<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדר הדיונים</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-stone-50 text-stone-900 font-serif min-h-screen">

  <!-- ================================================================= -->
  <!-- LANDING PAGE                                                      -->
  <!-- ================================================================= -->
  <div id="landing-page" class="max-w-3xl mx-auto py-12 px-6">
    <h1 class="text-3xl font-bold text-center mb-10">חדר הדיונים</h1>

    <!-- New Meeting Form -->
    <section class="bg-white rounded-lg shadow-sm border border-stone-200 p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">פגישה חדשה</h2>

      <form id="new-meeting-form" class="space-y-4">
        <div>
          <label for="meeting-title" class="block text-sm font-medium text-stone-700 mb-1">כותרת</label>
          <input
            type="text"
            id="meeting-title"
            name="title"
            required
            class="w-full border border-stone-300 rounded px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
            placeholder="למשל: גן עדן — בראשית ב:ד-ב:יז"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-2">משתתפים</label>
          <div id="participant-cards" class="flex flex-wrap gap-3">
            <!-- Populated dynamically from /api/agents -->
          </div>
          <p id="no-participants-error" class="text-red-600 text-sm mt-1 hidden">יש לבחור לפחות משתתף אחד</p>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2.5 px-4 rounded transition-colors"
          >
            התחל דיון
          </button>
        </div>
      </form>
    </section>

    <!-- Previous Meetings -->
    <section class="bg-white rounded-lg shadow-sm border border-stone-200 p-6">
      <h2 class="text-xl font-semibold mb-4">פגישות</h2>
      <div id="meeting-list">
        <p class="text-stone-400 text-sm">טוען...</p>
      </div>
    </section>
  </div>

  <!-- ================================================================= -->
  <!-- DELIBERATION UI                                                   -->
  <!-- ================================================================= -->
  <div id="deliberation-page" class="deliberation-room hidden">

    <!-- Conversation Feed -->
    <div class="conversation-feed overflow-y-auto p-4">
      <!-- View-only banner -->
      <div id="view-only-banner" class="hidden bg-stone-100 border border-stone-300 rounded px-4 py-2 mb-4 text-center text-sm text-stone-600">
        מצב צפייה בלבד
      </div>
      <div id="conversation-messages" class="space-y-4">
        <!-- Messages rendered here -->
      </div>
    </div>

    <!-- Vibe Bar -->
    <div class="vibe-bar border-t border-stone-200 px-4 py-2 flex items-center gap-3 bg-stone-50 transition-all duration-300">
      <button
        id="pause-btn"
        class="text-sm border border-stone-300 text-stone-600 rounded px-3 py-1 hover:bg-stone-100 transition-colors"
        title="השהה/המשך"
      >
        &#x25B6; המשך
      </button>
      <span class="text-amber-700 font-bold">✦</span>
      <span id="vibe-text" class="flex-1 text-sm text-stone-600">ממתין...</span>
      <span id="vibe-next" class="text-sm text-stone-500"></span>
      <span id="vibe-phase" class="text-xs bg-stone-200 text-stone-600 px-2 py-0.5 rounded-full"></span>
      <span id="vibe-cost" class="hidden text-xs text-stone-400" title="עלות משוערת"></span>
      <button
        id="attention-btn"
        class="hidden text-sm border border-amber-500 text-amber-700 rounded px-3 py-1 hover:bg-amber-50 transition-colors"
        title="בקשת רשות דיבור"
      >
        &#x270B; תשומת לב
      </button>
    </div>

    <!-- Human Input -->
    <div class="human-input border-t border-stone-200 p-3 bg-white">
      <div class="flex gap-2 items-end">
        <label for="human-input-textarea"></label>
        <textarea
          id="human-input-textarea"
          dir="auto"
          rows="2"
          class="flex-1 border border-stone-300 rounded px-3 py-2 text-base resize-none focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 disabled:bg-stone-100 disabled:text-stone-400"
          placeholder="הקלד הודעה או /end לסיום"
          disabled
        ></textarea>
        <button
          id="human-submit-btn"
          class="bg-amber-600 hover:bg-amber-700 disabled:bg-stone-300 text-white font-semibold py-2 px-4 rounded transition-colors"
          disabled
        >
          &#x21B5;
        </button>
      </div>
    </div>

  </div>

  <!-- ================================================================= -->
  <!-- ROLLBACK CONFIRMATION DIALOG                                      -->
  <!-- ================================================================= -->
  <div id="rollback-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4 p-6">
      <h3 class="text-lg font-semibold mb-4">חזרה לנקודה קודמת</h3>
      <div id="rollback-preview" class="bg-stone-50 border border-stone-200 rounded p-3 mb-3 text-sm max-h-32 overflow-y-auto">
        <!-- Preview of target message -->
      </div>
      <p id="rollback-warning" class="text-amber-700 text-sm mb-4"></p>
      <p class="text-sm text-stone-500 mb-4">לאחר החזרה תוכל לערוך את ההודעה ולהמשיך משם.</p>
      <div class="flex gap-3 justify-end">
        <button id="rollback-cancel" class="px-4 py-2 border border-stone-300 rounded hover:bg-stone-50 transition-colors">ביטול</button>
        <button id="rollback-confirm" class="px-4 py-2 bg-amber-600 text-white rounded hover:bg-amber-700 transition-colors">אישור חזרה</button>
      </div>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- RECONNECTION INDICATOR                                            -->
  <!-- ================================================================= -->
  <div id="reconnecting-indicator" class="hidden fixed top-4 start-1/2 -translate-x-1/2 bg-amber-100 text-amber-800 text-sm px-4 py-2 rounded-full shadow z-40">
    מתחבר מחדש...
  </div>

  <!-- Back to landing button (visible during deliberation) -->
  <button
    id="back-to-landing"
    class="hidden fixed top-4 end-4 z-30 text-sm text-stone-500 hover:text-stone-700 bg-white border border-stone-300 rounded px-3 py-1 shadow-sm"
  >
    &#x2190; חזרה
  </button>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
