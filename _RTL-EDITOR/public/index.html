<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/public/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עורך Markdown בעברית</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "codemirror": "/node_modules/codemirror/dist/index.js",
            "@codemirror/autocomplete": "/node_modules/@codemirror/autocomplete/dist/index.js",
            "@codemirror/commands": "/node_modules/@codemirror/commands/dist/index.js",
            "@codemirror/language": "/node_modules/@codemirror/language/dist/index.js",
            "@codemirror/lint": "/node_modules/@codemirror/lint/dist/index.js",
            "@codemirror/search": "/node_modules/@codemirror/search/dist/index.js",
            "@codemirror/state": "/node_modules/@codemirror/state/dist/index.js",
            "@codemirror/view": "/node_modules/@codemirror/view/dist/index.js",
            "@codemirror/lang-markdown": "/node_modules/@codemirror/lang-markdown/dist/index.js",
            "@codemirror/lang-html": "/node_modules/@codemirror/lang-html/dist/index.js",
            "@codemirror/lang-css": "/node_modules/@codemirror/lang-css/dist/index.js",
            "@codemirror/lang-javascript": "/node_modules/@codemirror/lang-javascript/dist/index.js",
            "@lezer/common": "/node_modules/@lezer/common/dist/index.js",
            "@lezer/highlight": "/node_modules/@lezer/highlight/dist/index.js",
            "@lezer/lr": "/node_modules/@lezer/lr/dist/index.js",
            "@lezer/markdown": "/node_modules/@lezer/markdown/dist/index.js",
            "@lezer/html": "/node_modules/@lezer/html/dist/index.js",
            "@lezer/css": "/node_modules/@lezer/css/dist/index.js",
            "@lezer/javascript": "/node_modules/@lezer/javascript/dist/index.js",
            "style-mod": "/node_modules/style-mod/src/style-mod.js",
            "w3c-keyname": "/node_modules/w3c-keyname/index.js",
            "crelt": "/node_modules/crelt/index.js",
            "@marijn/find-cluster-break": "/node_modules/@marijn/find-cluster-break/src/index.js"
        }
    }
    </script>
    <script type="module" src="src/app.js"></script>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="file-tree" id="file-tree">
                Loading files...
            </div>
        </div>

        <div class="splitter" id="splitter"></div>

        <div class="main-content">
            <div class="tabs" id="tabs"></div>
            <div class="editor-pane">
                <!-- Editors will be injected here -->
            </div>
        </div>
    </div>

    <button id="help-button" class="help-button" type="button" title="macOS-ניקוד ב"><span>ֶ</span></button>

    <div id="help-overlay" class="help-overlay" hidden>
        <div class="help-dialog" role="dialog" aria-modal="true">
            <button class="help-close" type="button" aria-label="סגור">×</button>
            <div class="help-title">ניקוד ב-macOS:</div>
            <ul>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>4</span><span>←</span><span>כִ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>5</span><span>←</span><span>כֵ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>6</span><span>←</span><span>כַ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>7</span><span>←</span><span>כָ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>8</span><span>←</span><span>כֻ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>9</span><span>←</span><span>כֶ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>0</span><span>←</span><span>כְ</span></div></li>
                <li><div class="help-nikud-row"><span>Shift         </span><span>+</span><span>ו</span><span>←</span><span>וֹ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>ו</span><span>←</span><span>וּ</span></div></li>
                <li><div class="help-nikud-row"><span>Left-Shift    </span><span>+</span><span>ש</span><span>←</span><span>שׁ</span></div></li>
                <li><div class="help-nikud-row"><span>Right-Shift   </span><span>+</span><span>ש</span><span>←</span><span>שׂ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>ת</span><span>←</span><span>כּ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>+</span><span>←</span><span>כֹ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>1</span><span>←</span><span>כֲ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>2</span><span>←</span><span>כֳ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>3</span><span>←</span><span>כֱ</span></div></li>
                <li><div class="help-nikud-row"><span>Alt           </span><span>+</span><span>״</span><span>←</span><span>כֲ</span></div></li>
            </ul>
        </div>
    </div>
</body>
</html>
